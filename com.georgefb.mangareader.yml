---
app-id: com.georgefb.mangareader
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: mangareader
rename-icon: mangareader
copy-icon: true
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host:ro
  - --filesystem=home
modules:
  - name: mangareader
    buildsystem: cmake-ninja
    post-install:
      - install -Dm644 -t /app/share/licenses/${FLATPAK_ID} LICENSES/*
    sources:
      - type: archive
        url: https://github.com/g-fb/mangareader/archive/refs/tags/2.4.0.tar.gz
        sha256: 8c19856110256702563dd1e7513878a4fc4212390b409e7030c7a604f8745834

  - name: karchive
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.24/karchive-6.24.0.tar.xz
        sha256: b68faa1c9012e40bbed516d8bb6be21e743af5aafb0249a84c29a7d9ff150d0d
      - type: patch
        path: karchive-use-correct-variable.diff
        x-checker-data:
          type: anitya
          project-id: 8762
          url-template: https://download.kde.org/stable/frameworks/$version/karchive-$version.tar.xz

  - name: unrar
    no-autogen: true
    make-install-args:
      - DESTDIR=/app
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-7.2.5.tar.gz
        sha256: 3d7b402ce7b9825af32a5f593379269e742c883d9d276527be19d0e9f6a114f9
        x-checker-data:
          type: anitya
          project-id: 13306
          url-template: https://www.rarlab.com/rar/unrarsrc-$version.tar.gz
