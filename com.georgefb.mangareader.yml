---
app-id: com.georgefb.mangareader
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: mangareader
rename-icon: mangareader
copy-icon: true
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host:ro
  - --filesystem=home
modules:
  - name: mangareader
    buildsystem: cmake-ninja
    post-install:
      - install -Dm644 -t /app/share/licenses/${FLATPAK_ID} LICENSES/*
    sources:
      - type: archive
        url: https://github.com/g-fb/mangareader/archive/refs/tags/2.5.1.tar.gz
        sha256: def520cc4f1930d440124d79a91b1c53249307dcc77af9d9704c91ba9b318ea2

  - name: karchive
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/frameworks/6.26/karchive-6.26.0.tar.xz
        sha256: a7fdf6d0b8db88d60aa52bcc87d8e00d95391a1ad39a4b2a8e9f3027b8ff4035
      - type: patch
        path: karchive-use-correct-variable.diff
        x-checker-data:
          type: anitya
          project-id: 8762
          url-template: https://download.kde.org/stable/frameworks/$version/karchive-$version.tar.xz

  - name: unrar
    no-autogen: true
    make-install-args:
      - DESTDIR=/app
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-7.2.6.tar.gz
        sha256: d1afa67ef4121ebc5986815699e05db0ce8648499e5dca854f282a4c3f72c003
        x-checker-data:
          type: anitya
          project-id: 13306
          url-template: https://www.rarlab.com/rar/unrarsrc-$version.tar.gz
